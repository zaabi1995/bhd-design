server {
  listen 80;
  listen 443 ssl http2;
  server_name design.bhd.om;

  # Reuse apex bhd.om wildcard CF Origin cert (15-year, expires 2041-01-09).
  # *.bhd.om SAN covers design.bhd.om.
  ssl_certificate /www/server/panel/vhost/cert/bhd.om/fullchain.pem;
  ssl_certificate_key /www/server/panel/vhost/cert/bhd.om/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  root /www/wwwroot/design.bhd.om;
  index index.html;

  # CORS: allow CSS/JS to be pulled cross-origin by every BHD-Group project.
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

  # gzip the text payloads
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/html
    application/json
    application/javascript
    application/xml
    image/svg+xml;

  # CSS + JS modules: short cache so portfolio sites pick up updates within
  # 5 minutes. Use a version query param (e.g. tokens.css?v=2) for hard pin.
  location ~* \.(css|js|jsx)$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    add_header Access-Control-Allow-Origin "*" always;
    types {
      text/css css;
      application/javascript js;
      application/javascript jsx;
    }
  }

  # HTML (admin-shell, index): same short cache
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300" always;
  }

  # SVGs (icons, illustrations): 1y cache, content-addressed by filename
  location ~* \.svg$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
    autoindex off;
  }

  location ~ /\. { deny all; }

  access_log /www/wwwlogs/design.bhd.om.access.log;
  error_log /www/wwwlogs/design.bhd.om.error.log;
}
